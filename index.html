<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف عباد الرحمن</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Aref+Ruqaa&display=swap');

        body { background-color: #2c5530; font-family: 'Amiri Quran', serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        
        .phone-container { width: 100%; max-width: 450px; background-color: #fffcf5; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); padding-bottom: 30px; }

        /* القائمة الجانبية */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0; background-color: #1e3d22; overflow-x: hidden; transition: 0.5s; padding-top: 20px; }
        .sidenav a, .sidenav p { padding: 12px 20px; text-decoration: none; font-size: 1.1rem; color: #f4ede0; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidenav a:hover { background-color: #b08d57; }
        .sidenav .closebtn { font-size: 30px; cursor: pointer; color: white; padding: 10px; }
        .sidenav .section-header { background: #2c5530; color: #ffd700; font-weight: bold; font-size: 0.9rem; border: none; padding: 10px 20px; }

        /* الهيدر */
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 2px solid #b08d57; background: #fffcf5; margin-top: 20px; }
        .menu-btn { background: #2c5530; border: none; font-size: 24px; color: white; cursor: pointer; padding: 5px 12px; border-radius: 5px; z-index: 10; }
        .app-name { position: absolute; width: 100%; text-align: center; top: 10px; font-size: 0.85rem; color: #2c5530; font-weight: bold; letter-spacing: 1px; }
        .header-title { font-family: 'Aref Ruqaa', serif; font-size: 2.2rem; color: #b08d57; flex-grow: 1; text-align: center; margin: 0; }

        /* محتوى القرآن */
        .quran-content { padding: 25px; font-size: 1.85rem; line-height: 2.8; text-align: justify; color: #222; }
        .ayah-number { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid #b08d57; border-radius: 50%; font-family: Arial; font-size: 0.85rem; margin: 0 6px; color: #2c5530; font-weight: bold; background: #fff; }
        
        .controls { padding: 15px 25px; text-align: center; }
        select { padding: 10px; border: 1px solid #b08d57; border-radius: 8px; width: 100%; font-family: 'Amiri Quran', serif; font-size: 1.2rem; background: white; cursor: pointer; }
        
        .basmala { text-align: center; font-size: 2.2rem; color: #b08d57; margin: 20px 0; font-family: 'Amiri Quran', serif; }
        .footer { text-align: center; padding: 25px; color: #b08d57; font-size: 0.95rem; border-top: 1px solid #eee; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="app-name">مصحف عباد الرحمن</div>

        <div id="mySidenav" class="sidenav">
            <div class="closebtn" onclick="closeNav()">&times; اغلاق</div>
            
            <p class="section-header">الاستماع للمشايخ (روابط)</p>
            <a href="https://alkabbah.com/scholar/122/aabd-albast-aabd-alsmd/recitations" target="_blank">🎤 الشيخ عبد الباسط</a>
            <a href="https://alkabbah.com/recitations/playlist/752388/tornt-mshf-almnshaoy-mrtl-mtrgm-aordo-114-sor-kaml-128-k-b-anthr-llshrh-orabt-altornt-asfl-almshf-baad-aldght-aal-almzyd-mhmd-sdyk-almnshaoy" target="_blank">🎤 الشيخ المنشاوي</a>
            <a href="https://alkabbah.com/recitations/playlist/752953/tornt-mshf-albna-mrtl-114-sor-kaml-128-k-b-anthr-llshrh-orabt-altornt-asfl-almshf-baad-aldght-aal-almzyd-mhmod-aal-albna" target="_blank">🎤 الشيخ البنا</a>
            
            <p class="section-header">خدمات</p>
            <a href="https://qurany.live/radio/8224" target="_blank">📻 راديو مصر مباشر</a>
            <a href="#" onclick="alert('مصحف عباد الرحمن\nتصميم: إبراهيم العجرودي')">ℹ️ حول التطبيق</a>
            <a href="#" style="color: #ffd700;" onclick="alert('قريباً')">💰 الدعم المادي</a>
        </div>

        <div class="header">
            <button class="menu-btn" onclick="openNav()">&#9776;</button>
            <h1 id="surahTitle" class="header-title">سورة الفاتحة</h1>
        </div>

        <div class="controls">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
        </div>

        <div id="quranText" class="quran-content">جاري تحميل الآيات...</div>

        <div class="footer">صناعة إبراهيم العجرودي</div>
    </div>

    <script>
        function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

        async function init() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                const select = document.getElementById('surahSelect');
                data.data.forEach(surah => {
                    let option = document.createElement('option');
                    option.value = surah.number;
                    option.text = `${surah.number}. ${surah.name}`;
                    select.appendChild(option);
                });
                loadSurah(1);
            } catch (e) { document.getElementById('quranText').innerText = "خطأ في الاتصال بالإنترنت."; }
        }

        async function loadSurah(num) {
            const contentDiv = document.getElementById('quranText');
            const titleDiv = document.getElementById('surahTitle');
            contentDiv.innerHTML = "جاري تحميل كلام الله...";

            try {
                const resText = await fetch(`https://api.alquran.cloud/v1/surah/${num}/quran-uthmani`);
                const dataText = await resText.json();
                titleDiv.innerText = dataText.data.name;
                
                let fullText = "";
                dataText.data.ayahs.forEach((ayah, index) => {
                    let text = ayah.text;
                    if (num != 1 && index === 0 && text.includes("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ")) {
                        fullText += `<div class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
                        text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
                    }
                    fullText += `${text} <span class="ayah-number">${ayah.numberInSurah}</span> `;
                });
                contentDiv.innerHTML = fullText;
                window.scrollTo(0, 0); // العودة لأعلى الصفحة عند تغيير السورة
                closeNav();
            } catch (e) { contentDiv.innerHTML = "يرجى التحقق من الإنترنت."; }
        }
        init();
    </script>
</body>
</html>
